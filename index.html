<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#12071f" />
  <title>Mizuki</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Fondo -->
    <div class="bg"></div>

    <!-- Personaje (se reemplaza por sprites al iniciar) -->
    <canvas id="stage"></canvas>
    <div id="touch"></div>

    <!-- Burbuja de diálogo -->
    <div id="bubble" class="bubble hidden">
      <span id="bubbleText"></span>
    </div>

    <!-- Estado / nombre -->
    <div class="topbar">
      <div class="name">Mizuki <span id="moodDot" class="mood-dot"></span></div>
      <div class="hint" id="hint">tócala o dale al micro</div>
    </div>

    <!-- Botón instalar (aparece solo si el navegador lo permite) -->
    <button id="installBtn" class="install-btn hidden">📲 Instalar en mi celular</button>

    <!-- Controles -->
    <div class="controls">
      <button id="micBtn" class="btn mic" aria-label="Hablar">
        <svg viewBox="0 0 24 24" width="30" height="30"><path fill="currentColor" d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V22h2v-3.08A7 7 0 0 0 19 12h-2Z"/></svg>
      </button>

      <form id="textForm" class="text-row">
        <input id="textInput" type="text" autocomplete="off" placeholder="escríbele algo…" />
        <button id="sendBtn" class="btn send" type="submit" aria-label="Enviar">
          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M3 20.5v-6l8-2.5-8-2.5v-6L22 11 3 20.5Z"/></svg>
        </button>
      </form>

      <button id="menuBtn" class="btn ghost" aria-label="Ajustes">
        <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm8.94 4a7 7 0 0 0-.14-1.4l2.1-1.65-2-3.46-2.5 1a7 7 0 0 0-2.42-1.4L15.5 2h-4l-.48 2.69a7 7 0 0 0-2.42 1.4l-2.5-1-2 3.46L4.2 10.6a7 7 0 0 0 0 2.8l-2.1 1.65 2 3.46 2.5-1a7 7 0 0 0 2.42 1.4L11.5 22h4l.48-2.69a7 7 0 0 0 2.42-1.4l2.5 1 2-3.46-2.1-1.65c.09-.46.14-.93.14-1.4Z"/></svg>
      </button>
    </div>

    <!-- Panel de ajustes -->
    <div id="settings" class="settings hidden">
      <h2>Ajustes</h2>
      <label>Voz
        <select id="voiceSelect"></select>
      </label>
      <label>Tono (agudo) <span id="pitchVal"></span>
        <input id="pitch" type="range" min="0.5" max="2" step="0.05" />
      </label>
      <label>Velocidad <span id="rateVal"></span>
        <input id="rate" type="range" min="0.6" max="1.4" step="0.05" />
      </label>
      <label class="switch">
        <input id="autoListen" type="checkbox" />
        <span>Escucha continua (te oye siempre)</span>
      </label>
      <label class="switch">
        <input id="ttsOn" type="checkbox" checked />
        <span>Que hable en voz alta</span>
      </label>
      <div class="ai-box">
        <label class="switch">
          <input id="aiMode" type="checkbox" />
          <span>🧠 Modo IA (conversación real)</span>
        </label>
        <label>Modelo
          <select id="aiModel">
            <option value="rapido">Rápido — más veloz (≈0.5 GB)</option>
            <option value="equilibrado" selected>Equilibrado — mejor español (≈1.2 GB)</option>
            <option value="llama1b">Llama 1B (≈0.9 GB)</option>
          </select>
        </label>
        <div id="aiStatus" class="ai-status">Descarga el modelo una vez (con internet); luego va offline. Requiere Chrome con WebGPU. En tu G99 puede tardar varios segundos por respuesta.</div>
      </div>

      <button id="testVoice" class="btn wide">Probar voz</button>
      <button id="resetMemory" class="btn wide danger">Borrar memoria</button>
      <button id="closeSettings" class="btn wide">Cerrar</button>
      <p class="ver">Mizuki · offline · v1</p>
    </div>
  </div>

  <script src="js/character.js"></script>
  <script src="js/personality.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
    }
  </script>
</body>
</html>
